<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Supply Tracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;padding:1rem}
.app{max-width:480px;margin:0 auto;padding:1.5rem 1rem}

.lang-bar{display:flex;gap:8px;margin-bottom:1.5rem;justify-content:center}
.lang-btn{padding:6px 18px;border-radius:20px;border:1.5px solid #ccc;background:transparent;color:#666;cursor:pointer;font-size:14px;font-weight:500}
.lang-btn.active{background:#111;color:#fff;border-color:#111}

.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:22px;font-weight:500;color:#111;margin-bottom:4px}
.header p{font-size:14px;color:#666}

.cards{display:flex;flex-direction:column;gap:16px;margin-bottom:2rem}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.25rem}

.card-top{display:flex;align-items:center;gap:14px;margin-bottom:1rem}

.icon{font-size:24px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.icon-milk{background:#E6F1FB}
.icon-ice{background:#EAF3DE}

.card-title{font-size:16px;font-weight:500;color:#111}
.card-sub{font-size:12px;color:#999}

.options{display:flex;flex-direction:column;gap:8px}

.opt-btn{
width:100%;
padding:11px 14px;
border-radius:8px;
border:1.5px solid #ddd;
background:transparent;
cursor:pointer;
font-size:14px;
font-weight:500;
display:flex;
align-items:center;
gap:10px
}

.opt-btn.sel-1{border-color:#1D9E75;background:#E1F5EE;color:#0F6E56}
.opt-btn.sel-2{border-color:#63991f;background:#f0f7e0;color:#3B6D11}
.opt-btn.sel-3{border-color:#BA7517;background:#FAEEDA;color:#854F0B}
.opt-btn.sel-4{border-color:#c45c20;background:#fce8da;color:#8a3a12}
.opt-btn.sel-5{border-color:#A32D2D;background:#FCEBEB;color:#A32D2D}

.opt-dot{width:10px;height:10px;border-radius:50%}
.d1{background:#1D9E75}
.d2{background:#63991f}
.d3{background:#BA7517}
.d4{background:#c45c20}
.d5{background:#E24B4A}

.send-btn{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#111;
color:#fff;
font-size:16px;
cursor:pointer
}

.send-btn:disabled{opacity:0.4}

.reporter-row input{
width:100%;
padding:9px 12px;
border-radius:8px;
border:0.5px solid #ddd;
background:#f9f9f9;
font-size:14px
}

.note{font-size:12px;color:#aaa;text-align:center;margin-top:1rem}

.toast{
position:fixed;
bottom:24px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:12px 24px;
border-radius:24px;
opacity:0;
transition:opacity .3s
}

.toast.show{opacity:1}
</style>
</head>

<body>

<div class="app">

<div class="lang-bar">
<button class="lang-btn" onclick="setLang('en')">EN</button>
<button class="lang-btn active" onclick="setLang('he')">עברית</button>
<button class="lang-btn" onclick="setLang('th')">ไทย</button>
</div>

<div class="header">
<h1 id="h-title">דיווח מצב מטבח</h1>
<p id="h-sub">בחר מצב ושלח דיווח לוואטסאפ</p>
</div>

<div class="cards">

<div class="card">
<div class="card-top">
<div class="icon icon-milk">🥛</div>
<div>
<div class="card-title">כמה חלב יש?</div>
<div class="card-sub">How much milk is there?</div>
</div>
</div>

<div class="options" id="milk-opts">
<button class="opt-btn" onclick="pick('milk',0)"><div class="opt-dot d1"></div>2 בקבוקים מלאים</button>
<button class="opt-btn" onclick="pick('milk',1)"><div class="opt-dot d2"></div>בקבוק מלא ובקבוק פתוח</button>
<button class="opt-btn" onclick="pick('milk',2)"><div class="opt-dot d5"></div>בקבוק פתוח בלבד</button>
</div>
</div>

<div class="card">
<div class="card-top">
<div class="icon icon-ice">🧊</div>
<div>
<div class="card-title">כמה שקיות קרח יש?</div>
<div class="card-sub">How many ice bags?</div>
</div>
</div>

<div class="options" id="ice-opts">
<button class="opt-btn" onclick="pick('ice',0)"><div class="opt-dot d1"></div>1 פתוחה + 4 סגורות</button>
<button class="opt-btn" onclick="pick('ice',1)"><div class="opt-dot d2"></div>1 פתוחה + 3 סגורות</button>
<button class="opt-btn" onclick="pick('ice',2)"><div class="opt-dot d3"></div>1 פתוחה + 2 סגורות</button>
<button class="opt-btn" onclick="pick('ice',3)"><div class="opt-dot d4"></div>1 פתוחה + 1 סגורה</button>
<button class="opt-btn" onclick="pick('ice',4)"><div class="opt-dot d5"></div>פתוחה בלבד</button>
</div>
</div>

<div class="card reporter-row">
<div style="font-size:12px;margin-bottom:6px">שמך (לא חובה)</div>
<input type="text" id="reporter-name">
</div>

</div>

<button class="send-btn" id="send-btn" onclick="sendReport()" disabled>
<span id="send-label">בחר מצב לפני שליחה</span>
</button>

<p class="note">Report sent via WhatsApp</p>

</div>

<div class="toast" id="toast"></div>

<script>

let sel={milk:null,ice:null}

function pick(item,idx){
sel[item]=idx
document.querySelectorAll('#'+item+'-opts .opt-btn').forEach((b,i)=>{
b.className='opt-btn'+(i===idx?' sel-'+(idx+1):'')
})
updateBtn()
}

function updateBtn(){
const ready=sel.milk!==null||sel.ice!==null
document.getElementById('send-btn').disabled=!ready
}

function sendReport(){

const reporter=document.getElementById('reporter-name').value.trim()

let lines=[]

if(sel.milk!==null){
lines.push('🥛 Milk status option '+(sel.milk+1))
}

if(sel.ice!==null){
lines.push('🧊 Ice status option '+(sel.ice+1))
}

const msg=`יותם יא מלך 👑

הגעתי למשרד והמצב במטבח:

${lines.join('\n')}

תוכל לקנות עוד למשרד?

תודה 🙏
${reporter}`

window.open('https://wa.me/972544338837?text='+encodeURIComponent(msg),'_blank')

const toast=document.getElementById('toast')
toast.innerText='Report sent!'
toast.classList.add('show')
setTimeout(()=>toast.classList.remove('show'),2500)

}

</script>

</body>
</html>
