<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Supply Tracker</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;padding:1rem}
.app{max-width:480px;margin:auto}

.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.lang-btn{padding:6px 16px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer}
.lang-btn.active{background:#111;color:#fff}

.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid #ddd}

.options{display:flex;flex-direction:column;gap:8px;margin-top:10px}

.opt-btn{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
cursor:pointer;
background:#fff
}

.opt-btn.sel{background:#E1F5EE;border-color:#1D9E75}

.send-btn{
width:100%;
padding:14px;
background:#111;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer
}

body{
text-align:center;
}

.options{
align-items:center;
}

.opt-btn{
text-align:center;
justify-content:center;
}

.send-btn:disabled{opacity:0.4}
</style>
</head>

<body>

<div class="app">

<div class="lang-bar">
<button class="lang-btn" onclick="setLang('en')">EN</button>
<button class="lang-btn" onclick="setLang('he')">עברית</button>
<button class="lang-btn" onclick="setLang('th')">ไทย</button>
</div>

<h2 id="title"></h2>
<p id="subtitle"></p>

<div class="card">

<div id="milk-question"></div>

<div class="options">
<button class="opt-btn milk-opt" onclick="pick(event,'milk',0)"></button>
<button class="opt-btn milk-opt" onclick="pick(event,'milk',1)"></button>
<button class="opt-btn milk-opt" onclick="pick(event,'milk',2)"></button>
</div>

</div>

<div class="card">

<div id="ice-question"></div>

<div class="options">
<button class="opt-btn ice-opt" onclick="pick(event,'ice',0)"></button>
<button class="opt-btn ice-opt" onclick="pick(event,'ice',1)"></button>
<button class="opt-btn ice-opt" onclick="pick(event,'ice',2)"></button>
<button class="opt-btn ice-opt" onclick="pick(event,'ice',3)"></button>
<button class="opt-btn ice-opt" onclick="pick(event,'ice',4)"></button>
</div>

</div>

<div class="card">
<div id="name-label"></div>
<input type="text" id="reporter-name">
</div>

<button class="send-btn" id="send-btn" onclick="sendReport()" disabled>
<span id="send-label"></span>
</button>

</div>

<script>

let lang="en"
let sel={milk:null,ice:null}

const DATA={

en:{
title:"Office Supply Tracker",
sub:"Select status and send a report",
milkQ:"🥛 How much milk is there?",
iceQ:"🧊 How many ice bags are there?",
name:"👤 Your name (optional)",
send:"Send WhatsApp Report",
milk:[
"🥛🥛 2 full bottles ✨ perfect",
"🥛 1 full + 1 open bottle",
"🥛 1 open bottle only"
],
ice:[
"🧊🧊🧊🧊 1 open + 4 sealed bags ✨ perfect",
"🧊🧊🧊 1 open + 3 sealed bags",
"🧊🧊 1 open + 2 sealed bags",
"🧊 1 open + 1 sealed bag",
"🧊 1 open bag only"
]
},

he:{
title:"דיווח מצב מטבח",
sub:"בחר מצב ושלח דיווח",
milkQ:"כמה חלב יש?",
iceQ:"כמה שקיות קרח יש?",
name:"שמך (לא חובה)",
send:"שלח דיווח בוואטסאפ",
milk:[
"2 בקבוקים מלאים ✨ מצב מושלם",
"בקבוק מלא ובקבוק פתוח",
"בקבוק פתוח בלבד"
],
ice:[
"אחת פתוחה ו-4 סגורות ✨ מצב מושלם",
"אחת פתוחה ו-3 סגורות",
"אחת פתוחה ו-2 סגורות",
"אחת פתוחה ואחת סגורה",
"פתוחה בלבד"
]
},

th:{
title:"รายงานสถานะห้องครัว",
sub:"เลือกสถานะแล้วส่งรายงาน",
milkQ:"มีนมเท่าไหร่?",
iceQ:"มีถุงน้ำแข็งกี่ถุง?",
name:"ชื่อของคุณ (ไม่บังคับ)",
send:"ส่งรายงานผ่าน WhatsApp",
milk:[
"ขวดเต็ม 2 ขวด ✨ สมบูรณ์แบบ",
"เต็ม 1 + เปิดแล้ว 1",
"เปิดแล้ว 1 ขวด"
],
ice:[
"เปิดแล้ว 1 + ปิดอยู่ 4 ✨",
"เปิดแล้ว 1 + ปิดอยู่ 3",
"เปิดแล้ว 1 + ปิดอยู่ 2",
"เปิดแล้ว 1 + ปิดอยู่ 1",
"เปิดแล้วเท่านั้น"
]
}

}

function setLang(l){

lang=l
const t=DATA[l]

document.getElementById("title").textContent=t.title
document.getElementById("subtitle").textContent=t.sub
document.getElementById("milk-question").textContent=t.milkQ
document.getElementById("ice-question").textContent=t.iceQ
document.getElementById("name-label").textContent=t.name
document.getElementById("send-label").textContent=t.send

document.querySelectorAll(".milk-opt").forEach((b,i)=>{
b.textContent=t.milk[i]
})

document.querySelectorAll(".ice-opt").forEach((b,i)=>{
b.textContent=t.ice[i]
})

document.querySelectorAll(".lang-btn").forEach(btn=>btn.classList.remove("active"))
if(l==="en")document.querySelectorAll(".lang-btn")[0].classList.add("active")
if(l==="he")document.querySelectorAll(".lang-btn")[1].classList.add("active")
if(l==="th")document.querySelectorAll(".lang-btn")[2].classList.add("active")

}

function pick(e,item,i){

sel[item]=i

e.target.parentElement.querySelectorAll(".opt-btn").forEach(b=>b.classList.remove("sel"))
e.target.classList.add("sel")

document.getElementById("send-btn").disabled=false
}

function sendReport(){

let lines=[]
if(sel.milk!==null)lines.push("🥛 "+DATA[lang].milk[sel.milk])
if(sel.ice!==null)lines.push("🧊 "+DATA[lang].ice[sel.ice])

const reporter=document.getElementById("reporter-name").value

const msg=`Kitchen status:
יותם יא מלך, מה שלומך? 👑

הגעתי למשרד והמצב במטבח הוא כזה:
${detailLines.join('\n')}

תוכל בבקשה לקנות עוד למשרד?
תודה רבה ויום טוב 🙏

${lines.join("\n")}

Reporter: ${reporter}`

//window.open("https://wa.me/972544338837?text="+encodeURIComponent(msg))
window.open("https://wa.me/972543021891?text="+encodeURIComponent(msg))
}

const browserLang=navigator.language

if(browserLang.startsWith("he"))setLang("he")
else if(browserLang.startsWith("th"))setLang("th")
else setLang("en")

</script>

</body>
</html>
